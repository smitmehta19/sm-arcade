<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0612" />
  <title>S × M ARCADE — Smit vs Meera</title>
  <meta name="description" content="A private 2-player arcade for Smit & Meera. 20 games, head-to-head scores, neon nights." />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- fonts loaded non-render-blocking so the app paints instantly even on slow/no network -->
  <link rel="stylesheet" media="print" onload="this.media='all'"
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" /></noscript>

  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- Animated arcade backdrop -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- ============ TOP BAR ============ -->
  <header class="topbar" id="topbar">
    <button class="icon-btn back-btn" id="backBtn" hidden aria-label="Back to arcade">‹</button>
    <a href="#/" class="brand" id="brand">
      <span class="brand-s">S</span><span class="brand-x">×</span><span class="brand-m">M</span>
      <span class="brand-word">ARCADE</span>
    </a>
    <div class="topbar-right">
      <div class="mini-score" id="miniScore" title="Head-to-head wins">
        <span class="ms-p p1"><i></i><b id="msP1">0</b></span>
        <span class="ms-sep">:</span>
        <span class="ms-p p2"><b id="msP2">0</b><i></i></span>
      </div>
      <button class="icon-btn" id="soundBtn" aria-label="Toggle sound" title="Sound">🔊</button>
    </div>
  </header>

  <!-- sync status pill -->
  <div class="sync-pill" id="syncPill" hidden></div>

  <!-- ============ MAIN VIEW (router renders here) ============ -->
  <main id="view" class="view"></main>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="bottomnav" id="bottomnav">
    <a href="#/" class="nav-item" data-route="home"><span class="ni-ico">🎮</span><span>Play</span></a>
    <a href="#/scores" class="nav-item" data-route="scores"><span class="ni-ico">🏆</span><span>Scores</span></a>
    <a href="#/us" class="nav-item" data-route="us"><span class="ni-ico">💞</span><span>Us</span></a>
  </nav>

  <!-- result overlay -->
  <div class="result-overlay" id="resultOverlay" hidden>
    <div class="result-card">
      <div class="confetti" id="confetti"></div>
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h2 class="result-title" id="resultTitle">Winner!</h2>
      <p class="result-sub" id="resultSub"></p>
      <div class="result-actions">
        <button class="btn btn-ghost" id="resHome">🏠 Arcade</button>
        <button class="btn btn-primary" id="resAgain">↻ Rematch</button>
      </div>
    </div>
  </div>

  <!-- Firebase is loaded dynamically by store.js ONLY when cloud sync is enabled in config.js -->

  <!-- App -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/games-classic.js"></script>
  <script src="assets/js/games-mind.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
